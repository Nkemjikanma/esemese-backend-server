name: esemese

services: 
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_ADMIN_USERNAME}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      APP_USER: ${DB_USERNAME}
      APP_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # loopback only - for migrations via sqlx from host
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [esemese]

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    security_opt: 
      - "no-new-privileges:true"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"                 # https://esemese.com in prod
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "127.0.0.1:9000:9000"
      # - "127.0.0.1:9001:9001" # stays off the vps - ssh tunnel when needed? 
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/app/logs          # was /logs — doc says /app/logs
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [esemese]
      
  # Uncomment once a Dockerfile exists at the repo root.
  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      rustfs:   {condition: service_started}
    env_file: .env
    environment:
      DB_HOST: postgres              # service-name DNS, not 127.0.0.1
      S3_ENDPOINT_INTERNAL: http://rustfs:9000
      S3_ENDPOINT_PUBLIC: https://s3.esemese.com
    ports:
      - "127.0.0.1:8000:8000"
    networks: [esemese]

volumes:
  pg_data:
  rustfs_data:
  rustfs_logs:

networks:
  esemese:
    driver: bridge
